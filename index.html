<style>
:root {
  --bg: #fdf0f5;
  --bg2: #fde8f0;
  --card: rgba(255,255,255,0.82);
  --card-border: rgba(255,200,220,0.5);
  --rose: #e8637a;
  --rose-light: #f4a0b0;
  --rose-dark: #c94060;
  --blush: #f9d0db;
  --mauve: #d4789a;
  --cream: #fff5f8;
  --text: #3a2030;
  --text2: #7a5068;
  --text3: #b08898;
  --green: #6dbf8a;
  --green-bg: #edfff4;
  --red: #e8637a;
  --red-bg: #fff0f2;
  --amber: #f0a050;
  --amber-bg: #fff8ee;
  --shadow: 0 8px 32px rgba(200,80,120,0.13);
  --shadow-sm: 0 2px 12px rgba(200,80,120,0.1);
  --radius: 20px;
  --radius-sm: 12px;
  font-family: 'Nunito', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: linear-gradient(160deg, #fde8f5 0%, #fdf0e8 50%, #f0e8fd 100%);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
}

/* ─── ANIMATED BG ─── */
.bg-blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.35; animation: blobFloat 8s ease-in-out infinite; }
.blob1 { width: 300px; height: 300px; background: #f9c8d8; top: -80px; left: -80px; animation-delay: 0s; }
.blob2 { width: 250px; height: 250px; background: #e8d0f8; top: 30%; right: -60px; animation-delay: 2s; }
.blob3 { width: 200px; height: 200px; background: #ffd8e8; bottom: 10%; left: 20%; animation-delay: 4s; }
@keyframes blobFloat { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

/* ─── APP SHELL ─── */
#app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

/* ─── AUTH SCREEN ─── */
#auth-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #fde0f0 0%, #f8e8ff 50%, #ffe0e8 100%);
  padding: 32px;
}

/* ─── LOGO ICON (no text) ─── */
.logo-icon {
  width: 100px; height: 100px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
}

/* Auth logo area */
.auth-logo {
  margin-bottom: 28px;
  display: flex; flex-direction: column; align-items: center;
}

/* Heartbeat animation for auth logo */
@keyframes heartbeat {
  0%   { transform: scale(1); }
  14%  { transform: scale(1.18); }
  28%  { transform: scale(1); }
  42%  { transform: scale(1.12); }
  70%  { transform: scale(1); }
  100% { transform: scale(1); }
}
@keyframes orbitLeft {
  0%   { transform: rotate(0deg) translateX(30px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(30px) rotate(-360deg); }
}
@keyframes orbitRight {
  0%   { transform: rotate(180deg) translateX(30px) rotate(-180deg); }
  100% { transform: rotate(540deg) translateX(30px) rotate(-540deg); }
}
@keyframes pulseGlow {
  0%,100% { filter: drop-shadow(0 0 6px rgba(232,99,122,0.4)); }
  50%      { filter: drop-shadow(0 0 18px rgba(232,99,122,0.8)); }
}
@keyframes authNeedle {
  0%   { transform: rotate(-78deg); }
  65%  { transform: rotate(26deg); }
  80%  { transform: rotate(18deg); }
  100% { transform: rotate(22deg); }
}

/* Auth logo SVG container */
.auth-logo-svg {
  width: 110px; height: 110px;
  animation: pulseGlow 2.4s ease-in-out infinite;
}

/* Header logo (smaller) */
.header-logo-icon {
  width: 40px; height: 40px;
  flex-shrink: 0;
}

/* Header logo text scroll-in */
@keyframes slideInLeft {
  0%   { opacity: 0; transform: translateX(-18px); }
  100% { opacity: 1; transform: translateX(0); }
}
.header-logo-text {
  font-size: 20px; font-weight: 900; color: var(--rose-dark);
  animation: slideInLeft 0.6s cubic-bezier(.34,1.56,.64,1) both;
}

.auth-title {
  font-size: 36px; font-weight: 900; color: var(--rose-dark);
  text-align: center; line-height: 1.1; margin-bottom: 8px;
}
.auth-sub { font-size: 15px; color: var(--text2); text-align: center; margin-bottom: 48px; font-weight: 600; }
.google-btn {
  display: flex; align-items: center; gap: 12px;
  background: white; border: 2px solid var(--blush);
  padding: 16px 32px; border-radius: 50px; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; color: var(--text);
  box-shadow: 0 4px 20px rgba(200,80,120,0.15);
  transition: all 0.2s; width: 100%; max-width: 320px; justify-content: center;
}
.google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,80,120,0.22); }
.auth-note { margin-top: 24px; font-size: 13px; color: var(--text3); text-align: center; }

/* ─── HEADER ─── */
#header {
  padding: 12px 20px 8px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(253,240,245,0.8); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--card-border);
}
.header-logo { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--mauve));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 14px; cursor: pointer;
  border: 2px solid white; box-shadow: var(--shadow-sm); overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ─── CONTENT ─── */
#content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; }
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 4px; }

/* ─── TAB BAR ─── */
#tabbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; display: flex;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
  border-top: 1px solid var(--card-border);
  padding: 8px 0 12px; z-index: 50;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; padding: 6px 4px;
  font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700;
  color: var(--text3); transition: all 0.2s;
}
.tab-btn.active { color: var(--rose); }
.tab-icon { font-size: 22px; transition: transform 0.2s; }
.tab-btn.active .tab-icon { transform: scale(1.15); }

/* ─── CARD ─── */
.card {
  background: var(--card); backdrop-filter: blur(12px);
  border: 1px solid var(--card-border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 20px; margin: 12px 16px;
}
.card-sm { padding: 14px; margin: 8px 16px; border-radius: var(--radius-sm); }

/* ─── PAGE TITLE ─── */
.page-title {
  font-size: 22px; font-weight: 900; color: var(--rose-dark);
  padding: 16px 16px 4px; line-height: 1.2;
}
.page-subtitle {
  font-size: 13px; color: var(--text3); font-weight: 600;
  padding: 0 16px 8px;
}

/* ─── JOURNEY TAB ─── */
.zero-state { text-align: center; padding: 40px 20px; }
.zero-emoji { font-size: 48px; margin-bottom: 16px; animation: heartbeat 2.2s ease-in-out infinite; }
.zero-title { font-size: 22px; font-weight: 900; color: var(--rose-dark); margin-bottom: 8px; line-height: 1.3; }
.zero-sub { font-size: 14px; color: var(--text2); font-weight: 600; }

.milestone-bar { margin: 0 16px 8px; }
.milestone-label { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.milestone-track { height: 12px; background: var(--blush); border-radius: 8px; overflow: hidden; }
.milestone-fill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(90deg, var(--rose-light), var(--rose));
  transition: width 1s cubic-bezier(.68,-0.55,.27,1.55);
  position: relative; overflow: hidden;
}
.milestone-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.milestone-text { font-size: 13px; color: var(--rose); font-weight: 700; text-align: center; margin-top: 8px; }

.stats-row { display: flex; gap: 8px; margin: 8px 16px; }
.stat-pill {
  flex: 1; background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 12px 8px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-num { font-size: 24px; font-weight: 900; color: var(--rose); }
.stat-lbl { font-size: 11px; color: var(--text3); font-weight: 700; margin-top: 2px; }

.section-title { font-size: 16px; font-weight: 800; color: var(--text); margin: 16px 16px 4px; }

.top-scorer-bar { margin: 4px 0; }
.tsb-label { font-size: 12px; font-weight: 700; color: var(--text2); display: flex; justify-content: space-between; margin-bottom: 3px; }
.tsb-track { height: 8px; background: var(--blush); border-radius: 6px; overflow: hidden; }
.tsb-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--rose-light), var(--rose)); transition: width 1.2s ease; }

.insight-pill {
  display: flex; align-items: center; gap: 10px;
  background: var(--cream); border: 1px solid var(--blush);
  border-radius: 12px; padding: 12px 14px; margin: 6px 0;
  font-size: 13px; font-weight: 600; color: var(--text2);
}
.insight-icon { font-size: 18px; flex-shrink: 0; }

.wisdom-card {
  background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%);
  border-radius: var(--radius); padding: 20px; margin: 12px 16px;
  color: white; text-align: center; position: relative; overflow: hidden;
}
.wisdom-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
}
.wisdom-text { font-size: 15px; font-weight: 700; line-height: 1.5; position: relative; transition: opacity 0.3s; }
.wisdom-dots { display: flex; gap: 6px; justify-content: center; margin-top: 14px; }
.wisdom-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.2s; }
.wisdom-dot.active { background: white; width: 18px; border-radius: 3px; }

/* ─── PEOPLE TAB ─── */
.filter-scroll { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 8px 16px; border-radius: 50px;
  border: 2px solid var(--blush); background: white;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--text2);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-chip.active {
  background: linear-gradient(135deg, var(--rose), var(--mauve));
  border-color: transparent; color: white;
  box-shadow: 0 4px 14px rgba(200,80,120,0.3);
}

.person-card {
  background: var(--card); backdrop-filter: blur(12px);
  border: 1px solid var(--card-border); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); padding: 16px; margin: 8px 16px;
  display: flex; align-items: center; gap: 14px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.person-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.person-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 4px 0 0 4px;
}
.person-card.pursue::before { background: var(--green); }
.person-card.maybe::before { background: var(--amber); }
.person-card.not-him::before { background: #ccc; }
.person-card.ghosted::before { background: #999; }
.person-card.on-pause::before { background: var(--amber); }
.person-card.red-flag::before { background: var(--red); }
.person-card.the-one::before { background: linear-gradient(180deg, #ffd700, var(--rose)); }

.person-avatar {
  width: 50px; height: 50px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose-light), var(--mauve));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 900; font-size: 20px; flex-shrink: 0; position: relative;
}
.score-ring { position: absolute; inset: -4px; width: 58px; height: 58px; }
.person-info { flex: 1; min-width: 0; }
.person-name { font-size: 16px; font-weight: 800; color: var(--text); }
.person-meta { font-size: 12px; color: var(--text3); font-weight: 600; margin-top: 2px; }
.person-badges { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 20px; }
.badge-mismatch { background: #fff3cd; color: #856404; }
.badge-risk { background: var(--red-bg); color: var(--red); }
.badge-theone { background: #fff9e6; color: #b8860b; }

.status-pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }
.status-pursue { background: var(--green-bg); color: #2d8a5a; }
.status-maybe { background: var(--amber-bg); color: #a06020; }
.status-not-him { background: #f5f5f5; color: #888; }
.status-ghosted { background: #f0f0f0; color: #888; }
.status-on-pause { background: var(--amber-bg); color: #a06020; }
.status-red-flag { background: var(--red-bg); color: var(--red); }
.status-the-one { background: #fff9e6; color: #b8860b; }

/* ─── FAB ─── */
.fab {
  position: fixed; bottom: 82px; right: calc(50% - 230px);
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--mauve));
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: white; box-shadow: 0 6px 24px rgba(200,80,120,0.4);
  transition: all 0.2s; z-index: 40;
}
.fab:hover { transform: scale(1.1) rotate(90deg); }
@media (max-width: 480px) { .fab { right: 20px; } }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(60,20,40,0.45); backdrop-filter: blur(6px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--bg); border-radius: 28px 28px 0 0;
  width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
  padding: 0 0 32px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--blush); border-radius: 2px; margin: 14px auto 0; }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 8px;
}
.modal-title { font-size: 20px; font-weight: 900; color: var(--text); }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text3); padding: 4px; }
.modal-body { padding: 8px 20px; }

/* ─── FORM ELEMENTS ─── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 800; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
  border: 2px solid var(--blush); background: white;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--rose-light); }
.form-textarea { resize: vertical; min-height: 80px; }

.option-grid { display: grid; gap: 8px; }
.option-grid.cols2 { grid-template-columns: 1fr 1fr; }
.option-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.option-btn {
  padding: 10px 8px; border-radius: var(--radius-sm);
  border: 2px solid var(--blush); background: white;
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; color: var(--text2);
  cursor: pointer; transition: all 0.18s; text-align: center; line-height: 1.3;
  -webkit-tap-highlight-color: transparent;
}
.option-btn.selected {
  border-color: var(--rose); background: linear-gradient(135deg, #fff0f4, #ffe0ea);
  color: var(--rose-dark); box-shadow: 0 2px 10px rgba(200,80,120,0.15);
}
.option-btn:active { transform: scale(0.96); }

/* ─── STAR RATING ─── */
.trait-list { display: flex; flex-direction: column; gap: 10px; }
.trait-row { display: flex; align-items: center; gap: 10px; }
.trait-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--text2); }
.star-row { display: flex; gap: 3px; }
.star { font-size: 22px; cursor: pointer; transition: transform 0.15s; color: #ddd; line-height: 1; -webkit-tap-highlight-color: transparent; }
.star.filled { color: #ffc107; }
.star:active { transform: scale(1.3); }

/* ─── FLAGS ─── */
.flag-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.flag-tag {
  padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.18s; border: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.flag-tag.green { background: var(--green-bg); color: #2d8a5a; border-color: #a8e6c0; }
.flag-tag.green.selected { background: #2d8a5a; color: white; }
.flag-tag.red { background: var(--red-bg); color: var(--red); border-color: #f9c0c8; }
.flag-tag.red.selected { background: var(--red); color: white; }

/* ─── YES/NO QUESTIONS ─── */
.yn-list { display: flex; flex-direction: column; gap: 12px; }
.yn-row {
  display: flex; flex-direction: column; gap: 8px;
  background: white; border: 1px solid var(--blush);
  border-radius: var(--radius-sm); padding: 10px 14px;
}
.yn-label { font-size: 13px; font-weight: 700; color: var(--text2); line-height: 1.35; }
.yn-btns { display: flex; gap: 6px; flex-shrink: 0; }
.nonneg-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
.yn-btn {
  padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 800;
  cursor: pointer; border: 2px solid var(--blush); background: white;
  font-family: 'Nunito', sans-serif; color: var(--text2); transition: all 0.15s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.yn-btn.yes.active { background: var(--green-bg); border-color: var(--green); color: #2d8a5a; }
.yn-btn.no.active  { background: var(--red-bg);   border-color: var(--red);   color: var(--red); }
.yn-btn.maybe.active { background: #fff8e1; border-color: #f0a500; color: #b07800; }

/* ─── STEP INDICATOR ─── */
.step-indicator { display: flex; gap: 6px; justify-content: center; padding: 12px 0 4px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blush); transition: all 0.3s; }
.step-dot.active { background: var(--rose); width: 24px; border-radius: 4px; }
.step-dot.done { background: var(--rose-light); }

.step-nav { display: flex; gap: 10px; margin-top: 20px; }
.btn-back {
  flex: 1; padding: 14px; border-radius: 50px; border: 2px solid var(--blush);
  background: white; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
  color: var(--text2); cursor: pointer; transition: all 0.2s;
}
.btn-next {
  flex: 2; padding: 14px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--rose), var(--mauve));
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
  color: white; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(200,80,120,0.3);
}
.btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(200,80,120,0.4); }
.btn-full {
  width: 100%; padding: 16px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--rose), var(--mauve));
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900;
  color: white; cursor: pointer; margin-top: 16px;
  box-shadow: 0 4px 18px rgba(200,80,120,0.35); transition: all 0.2s;
}
.btn-full:hover { transform: translateY(-1px); }
.btn-danger {
  background: none; border: 2px solid var(--red); color: var(--red); border-radius: 50px;
  padding: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all 0.2s; width: 100%; margin-top: 8px;
}

/* ─── PROFILE VIEW ─── */
.profile-header { padding: 24px 20px 16px; text-align: center; }
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose-light), var(--mauve));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 900; font-size: 32px;
  margin: 0 auto 12px; position: relative;
  box-shadow: 0 8px 24px rgba(200,80,120,0.25);
}
.profile-name { font-size: 26px; font-weight: 900; color: var(--text); }
.profile-meta { font-size: 13px; color: var(--text3); font-weight: 600; margin-top: 4px; }

.score-compat { display: flex; gap: 12px; margin: 12px 16px; }
.score-box {
  flex: 1; background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 16px; text-align: center; box-shadow: var(--shadow-sm);
}
.score-big { font-size: 28px; font-weight: 900; }
.score-lbl { font-size: 11px; color: var(--text3); font-weight: 700; margin-top: 2px; }

.info-tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 16px 12px; }
.info-tag {
  padding: 6px 14px; border-radius: 20px; background: var(--cream);
  border: 1px solid var(--blush); font-size: 12px; font-weight: 700; color: var(--text2);
}
.first-impression { margin: 8px 16px; }
.quote-box {
  background: linear-gradient(135deg, #fff5f8, #fff0ea);
  border-left: 4px solid var(--rose-light); border-radius: 0 12px 12px 0;
  padding: 14px 16px; font-size: 14px; color: var(--text2); font-style: italic; font-weight: 600;
}
.traits-section { margin: 12px 16px; }
.trait-detail { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--blush); }
.trait-detail:last-child { border-bottom: none; }
.trait-detail-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--text2); }
.trait-stars { font-size: 14px; color: #ffc107; }
.flags-section { margin: 12px 16px; display: flex; gap: 12px; }
.flags-col { flex: 1; }
.flags-title { font-size: 13px; font-weight: 800; color: var(--text2); margin-bottom: 8px; }

/* ─── INSIGHTS TAB ─── */
.bar-chart { margin: 4px 0; }
.bc-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
.bc-label { font-size: 12px; font-weight: 700; color: var(--text2); width: 110px; flex-shrink: 0; text-align: right; }
.bc-track { flex: 1; height: 10px; background: var(--blush); border-radius: 6px; overflow: hidden; }
.bc-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--rose-light), var(--rose)); transition: width 1.2s ease; }
.bc-count { font-size: 12px; font-weight: 800; color: var(--rose); width: 24px; }

/* Non-negotiables as checklist */
.nonneg-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 16px; margin: 8px 16px;
}
.nonneg-section-title { font-size: 15px; font-weight: 900; color: var(--rose-dark); margin-bottom: 12px; }
.nonneg-yn-row {
  display: flex; align-items: flex-start; gap: 10px;
  border-bottom: 1px solid var(--blush); padding: 10px 0;
}
.nonneg-yn-row:last-child { border-bottom: none; }
.nonneg-yn-text { flex: 1; font-size: 13px; font-weight: 600; color: var(--text2); line-height: 1.4; }
.nonneg-yn-btns { display: flex; gap: 6px; flex-shrink: 0; }
.nonneg-yn-btn {
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800;
  cursor: pointer; border: 2px solid var(--blush); background: white;
  font-family: 'Nunito', sans-serif; color: var(--text2); transition: all 0.15s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.nonneg-yn-btn.yes.active { background: var(--green-bg); border-color: var(--green); color: #2d8a5a; }
.nonneg-yn-btn.no.active  { background: var(--red-bg);   border-color: var(--red);   color: var(--red); }

/* ─── TOAST ─── */
.toast {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--text); color: white; padding: 12px 24px; border-radius: 50px;

    signOut();

    document.getElementById('auth-screen').style.display = 'flex';

  db.auth.onAuthStateChange(async (event, session) => {
    if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION' || event === 'TOKEN_REFRESHED') && session) {
      if (!currentUser) {
        currentUser = session.user;
        await loadPeople();
        showApp();

    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      window.location.reload();
    }
  });

      .update({ payload, updated_at: new Date().toISOString() })
      .eq('id', editingId)
      .eq('user_id', currentUser.id);
    if (error) { showToast('Error saving 😢 ' + error.message); return false; }
  } else {
    const { error } = await db.from('love_loading_people')
      .insert({ user_id: currentUser.id, payload });
    if (error) { showToast('Error saving 😢 ' + error.message); return false; }
  }
  await loadPeople();
  return true;
}

function deletePerson(id) {
  // confirm() is silently blocked in iOS PWA standalone mode — use custom overlay instead
  showConfirm('Delete this entry? This can\'t be undone 💔', async () => {
    // Find the person to get the DB row id
    const person = people.find(p => p.id === id || p._dbId === id);
    const dbId = person ? (person._dbId || person.id) : id;

    const { error, data } = await db.from('love_loading_people')
      .delete()
      .eq('id', dbId)
      .eq('user_id', currentUser.id)
      .select();
    if (error) { showToast('Could not delete 😢 ' + error.message); return; }
    // Fallback: old entries may be keyed by payload id
    if (!data || data.length === 0) {
      const { error: e2 } = await db.from('love_loading_people')
        .delete()
        .filter('payload->>id', 'eq', id)
        .eq('user_id', currentUser.id);
      if (e2) { showToast('Could not delete 😢 ' + e2.message); return; }
    }
    await loadPeople();
    closeProfileModal();
    renderCurrentTab();
    showToast('Deleted. Onwards! 💪');
  });
}

// ─── JOURNEY ───
function scorePersonQuality(p) {
  // 1. Non-Negotiables (40 pts) — 10 items x 4pts each
  let nnScore = 0;
  const nnKeys = ['nn1','nn2','nn3','nn4','nn5','nn6','nn7','nn8','nn9','nn10'];
  nnKeys.forEach(k => {
    const v = p.nonneg && p.nonneg[k];
    if (v === 'yes' || v === true) nnScore += 4;
    else if (v === 'maybe') nnScore += 2;
  });

  // 2. What You Feel (40 pts) — 25 traits, each rated 0-5, normalised to 40
  let traitScore = 0;
  if (p.traits && p.traits.length) {
    const traitTotal = p.traits.reduce((a, b) => a + (b || 0), 0);
    const traitMax = p.traits.length * 5;
    traitScore = traitMax > 0 ? (traitTotal / traitMax) * 40 : 0;
  }

  // 3. Status (20 pts)
  const statusMap = { 'the-one': 20, 'pursue': 20, 'maybe': 10, 'on-pause': 5, 'not-him': 0, 'ghosted': 0, 'red-flag': 0 };
  const statusScore = statusMap[p.status] || 0;

  // 4. Nice-to-Have bonus (up to 10 pts) — 6 items
  let nthScore = 0;
  const nthKeys = ['nth1','nth2','nth3','nth4','nth5','nth6'];
  nthKeys.forEach(k => {
    const v = p.nonneg && p.nonneg[k];
    if (v === 'yes' || v === true) nthScore += 10/6;
    else if (v === 'maybe') nthScore += 5/6;
  });

  // Total out of 110, normalised to 100
  const raw = nnScore + traitScore + statusScore + Math.min(10, nthScore);
  return Math.min(100, Math.round((raw / 110) * 100));
}

function getMilestoneProgress() {
  const theOne = people.some(p => p.status === 'the-one');
  if (theOne) return { pct: 100, label: MILESTONES[6].label };
  if (people.length === 0) return { pct: 0, label: MILESTONES[0].label };
  // Best quality score across all logged people
  const bestScore = Math.max(...people.map(p => scorePersonQuality(p)));
  const pct = Math.min(99, bestScore);
  const m = MILESTONES.find(m => pct >= m.min && pct <= m.max) || MILESTONES[1];
  return { pct, label: m.label };
}

function renderJourney() {
  const c = document.getElementById('content');
  const { pct, label } = getMilestoneProgress();
  const pursuing = people.filter(p => p.status === 'pursue').length;

  let html = '';

  // Always show the dum-biryani line; show "Tap +" prompt only when no entries yet
  html += `

  html += `

  html += `
    <div class="stats-row">
      <div class="stat-pill"><div class="stat-num">${people.length}</div><div class="stat-lbl">Talked to</div></div>
      <div class="stat-pill"><div class="stat-num">✅ ${pursuing}</div><div class="stat-lbl">Pursuing</div></div>
      <div class="stat-pill"><div class="stat-num">😂 ${survived}</div><div class="stat-lbl">Survived</div></div>
    </div>`;

  if (withScores.length > 0) {
    html += `<div class="section-title">🏆 Top Scorers</div><div class="card" style="margin:4px 16px;">`;
    withScores.forEach(p => {
      html += `
        <div class="top-scorer-bar">
          <div class="tsb-label"><span>${p.name}</span><span>${p.score.toFixed(1)}/5</span></div>
          <div class="tsb-track"><div class="tsb-fill" style="width:${(p.score/5)*100}%"></div></div>
        </div>`;
    });
    html += `</div>`;
  }

  if (people.length >= 2 && patterns.length > 0) {
    html += `<div class="section-title">💡 Pattern Insights</div><div style="margin:0 16px;">`;
    patterns.forEach(p => {
      html += `<div class="insight-pill"><span class="insight-icon">${p.icon}</span>${p.text}</div>`;
    });
    html += `</div>`;
  }

  html += `
    <div class="wisdom-card" id="wisdomCard">
      <div class="wisdom-text" id="wisdomText">${WISDOM[wisdomIndex]}</div>
      <div class="wisdom-dots" id="wisdomDots">${WISDOM.map((_,i) => `<div class="wisdom-dot${i===wisdomIndex?' active':''}" onclick="setWisdom(${i})"></div>`).join('')}</div>
    </div>`;

  c.innerHTML = html;
  setTimeout(() => {
    const fill = document.getElementById('mfill');
    if (fill) fill.style.width = pct + '%';

}

function getPatterns() {
  if (people.length < 2) return [];
  const patterns = [];
  const lowEmot = people.filter(p => p.traits && p.traits[8] > 0 && p.traits[8] <= 2).length;
  if (lowEmot >= 2) patterns.push({ icon:'💔', text:`${lowEmot} people you logged weren't emotionally available` });
  const mismatch = people.filter(p => p.intention === 'says-serious' || p.intention === 'casual').length;
  if (mismatch >= 1) patterns.push({ icon:'⚡', text:`${mismatch} ${mismatch===1?'person':'people'} you logged aren't fully serious` });
  const sourceCounts = {};
  people.forEach(p => { if(p.how_met) sourceCounts[p.how_met] = (sourceCounts[p.how_met]||0)+1; });
  const topSource = Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1])[0];
  if (topSource && topSource[1] >= 2) patterns.push({ icon:'📱', text:`Most connections from ${topSource[0]}` });
  const allRed = people.flatMap(p => p.red_flags || []);
  if (allRed.length >= 3) patterns.push({ icon:'🚩', text:`${allRed.length} red flags logged across everyone` });
  return patterns;
}

function startWisdom() {
  if (wisdomTimer) clearInterval(wisdomTimer);
  wisdomTimer = setInterval(() => {
    wisdomIndex = (wisdomIndex + 1) % WISDOM.length;
    const wt = document.getElementById('wisdomText');
    const wd = document.getElementById('wisdomDots');
    if (wt) { wt.style.opacity = 0; setTimeout(() => { wt.textContent = WISDOM[wisdomIndex]; wt.style.opacity = 1; }, 300); }
    if (wd) wd.innerHTML = WISDOM.map((_,i) => `<div class="wisdom-dot${i===wisdomIndex?' active':''}" onclick="setWisdom(${i})"></div>`).join('');
  }, 5000);
}

function setWisdom(i) {
  wisdomIndex = i;
  const wt = document.getElementById('wisdomText');
  const wd = document.getElementById('wisdomDots');
  if (wt) wt.textContent = WISDOM[i];
  if (wd) wd.innerHTML = WISDOM.map((_,i2) => `<div class="wisdom-dot${i2===i?' active':''}" onclick="setWisdom(${i2})"></div>`).join('');
}

// ─── PEOPLE ───
let currentFilter = 'all';

function renderPeople() {
  const c = document.getElementById('content');
  const filters = [
    { val:'all',      label:'📋 All' },
    { val:'pursue',   label:'✅ Pursue' },
    { val:'maybe',    label:'🤔 Maybe' },
    { val:'not-him',  label:'❌ Not Him' },
    { val:'ghosted',  label:'👻 Ghosted' }
  ];

  let filtered = currentFilter === 'all' ? people : people.filter(p => p.status === currentFilter);

  let html = `
    <div class="filter-scroll">`;
  filters.forEach(f => {
    html += `<button class="filter-chip${currentFilter===f.val?' active':''}" onclick="setFilter('${f.val}')">${f.label}</button>`;
  });
  html += `</div>`;

  if (filtered.length === 0) {
    html += `<div class="empty-people"><div class="big">🌸</div>${currentFilter==='all'?'No one logged yet. Tap + to add the first one!':'No one in this category yet.'}</div>`;
  } else {
    filtered.forEach(p => {
      const score = avgScore(p);
      const risk = calcRisk(p);
      const initials = (p.name || '?')[0].toUpperCase();
      const statusLabel = STATUSES.find(s => s.val === p.status)?.label || '🤔 Maybe';
      const statusCls = 'status-' + (p.status || 'maybe');
      const isMismatch = p.intention === 'says-serious' || p.intention === 'casual';
      const isHighRisk = risk > 50;

      html += `
        <div class="person-card ${p.status||'maybe'}" onclick="openProfile('${p.id}')">
          <div class="person-avatar">
            ${score > 0 ? `<svg style="position:absolute;inset:-4px;width:66px;height:66px;overflow:visible" viewBox="0 0 58 58"><circle cx="29" cy="29" r="25" fill="none" stroke="#f0d0d8" stroke-width="3"/><circle cx="29" cy="29" r="25" fill="none" stroke="#e8637a" stroke-width="3" stroke-dasharray="${(score/5)*157} 157" stroke-dashoffset="39" stroke-linecap="round" transform="rotate(-90 29 29)"/></svg>` : ''}
            ${initials}
          </div>
          <div class="person-info">
            <div class="person-name">${p.name || 'Unknown'}</div>
            <div class="person-meta">${p.how_met || ''} ${score > 0 ? '· ' + score.toFixed(1) + '/5 ⭐' : ''}</div>
            <div class="person-badges">
              ${isMismatch ? `<span class="badge badge-mismatch">⚡ Mismatch</span>` : ''}
              ${isHighRisk ? `<span class="badge badge-risk">⚠️ High Risk</span>` : ''}
              ${p.status === 'the-one' ? `<span class="badge badge-theone">🌟 The One!</span>` : ''}
            </div>
          </div>
          <div class="${statusCls} status-pill">${statusLabel}</div>
        </div>`;
    });
  }

  c.innerHTML = html;
}

function setFilter(f) {
  currentFilter = f;
  renderPeople();
}

function avgScore(p) {
  if (!p.traits || !p.traits.some(t => t > 0)) return 0;
  const rated = p.traits.filter(t => t > 0);
  return rated.reduce((a,b) => a+b, 0) / rated.length;
}

function calcRisk(p) {
  const redCount = (p.red_flags || []).length;
  const lowTraits = p.traits ? p.traits.filter(t => t > 0 && t <= 2).length : 0;
  return Math.min(100, (redCount * 12) + (lowTraits * 8));
}

function riskColor(risk) {
  if (risk < 30) return 'risk-green';
  if (risk < 60) return 'risk-amber';
  return 'risk-red';
}

// ─── PROFILE VIEW ───
function openProfile(id) {
  const p = people.find(x => x.id === id);
  if (!p) return;
  const score = avgScore(p);
  const risk = calcRisk(p);
  const statusLabel = STATUSES.find(s => s.val === p.status)?.label || '';
  const intentionLabel = INTENTIONS.find(i => i.val === p.intention)?.label || '';

  let html = `
    <div class="profile-header">
      <div class="profile-avatar">${(p.name||'?')[0].toUpperCase()}</div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-meta">${p.how_met || ''} · ${statusLabel}</div>
    </div>
    <div class="score-compat">
      <div class="score-box">
        <div class="score-big" style="color:var(--rose)">${score > 0 ? score.toFixed(1)+'/5' : '—'}</div>
        <div class="score-lbl">Compatibility ⭐</div>
      </div>
      <div class="score-box">
        <div class="score-big ${riskColor(risk)}">${risk}%</div>
        <div class="score-lbl">Risk Level ${risk < 30 ? '💚' : risk < 60 ? '🟡' : '🔴'}</div>
      </div>
    </div>`;

  if (intentionLabel) {
    html += `<div class="info-tags"><span class="info-tag">${intentionLabel}</span></div>`;
  }

  if (p.first_impression) {
    html += `<div class="first-impression"><div class="quote-box">"${p.first_impression}"</div></div>`;
  }

  // YN answers
  if (p.yn && Object.keys(p.yn).length > 0) {
    html += `<div class="section-title" style="margin:12px 16px 4px">🔍 Quick Facts</div>`;
    html += `<div style="margin:0 16px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">`;
    YN_QUESTIONS.forEach(q => {
      const val = p.yn[q.key];
      if (val !== undefined) {
        html += `<span class="info-tag" style="background:${val?'var(--green-bg)':'var(--red-bg)'};color:${val?'#2d8a5a':'var(--red)'}">${q.label.split('?')[0]} ${val?'✓':'✗'}</span>`;
      }
    });
    html += `</div>`;
  }

  const ratedTraits = TRAITS.map((t, i) => ({ name: t, val: p.traits?.[i] || 0 })).filter(t => t.val > 0);
  if (ratedTraits.length > 0) {
    html += `<div class="section-title" style="margin:12px 16px 4px">⭐ Ratings</div>`;
    html += `<div class="traits-section">`;
    ratedTraits.forEach(t => {
      const stars = '★'.repeat(t.val) + '☆'.repeat(5 - t.val);
      html += `<div class="trait-detail">
        <div class="trait-detail-name">${t.name}</div>
        <div class="trait-stars">${stars}</div>
      </div>`;
    });
    html += `</div>`;
  }

  const gf = p.green_flags || [];
  const rf = p.red_flags || [];
  if (gf.length > 0 || rf.length > 0) {
    html += `<div class="flags-section">`;
    if (gf.length > 0) {
      html += `<div class="flags-col"><div class="flags-title">💚 Green Flags</div>`;
      gf.forEach(f => html += `<div style="font-size:12px;font-weight:700;color:#2d8a5a;margin:4px 0">✓ ${f}</div>`);
      html += `</div>`;
    }
    if (rf.length > 0) {
      html += `<div class="flags-col"><div class="flags-title">🚩 Red Flags</div>`;
      rf.forEach(f => html += `<div style="font-size:12px;font-weight:700;color:var(--red);margin:4px 0">✗ ${f}</div>`);
      html += `</div>`;
    }
    html += `</div>`;
  }

  if (p.one_liner) {
    html += `<div style="margin:8px 16px"><div class="section-title" style="margin:4px 0 6px">💭 The Vibe</div>`;
    html += `<div class="quote-box">${p.one_liner}</div></div>`;
  }
  if (p.notes) {
    html += `<div style="margin:8px 16px"><div class="section-title" style="margin:4px 0 6px">📝 Notes</div>`;
    html += `<div style="font-size:13px;font-weight:600;color:var(--text2);line-height:1.6">${p.notes}</div></div>`;
  }

  html += `<div style="padding:16px">
    <button class="btn-full" onclick="openEditModal('${id}')">✏️ Edit</button>
    <button class="btn-danger" onclick="deletePerson('${id}')">🗑️ Delete</button>
  </div>`;

  document.getElementById('profileContent').innerHTML = html;
  document.getElementById('profileModal').classList.add('open');

// ─── INSIGHTS ───
function renderInsights() {
  const c = document.getElementById('content');

  const metCounts = {};
  HOW_MET.forEach(h => metCounts[h] = 0);
  people.forEach(p => { if(p.how_met) metCounts[p.how_met] = (metCounts[p.how_met]||0)+1; });
  const metMax = Math.max(...Object.values(metCounts), 1);

  const allRed = people.flatMap(p => p.red_flags || []);
  const redCounts = {};
  allRed.forEach(f => redCounts[f] = (redCounts[f]||0)+1);
  const topRed = Object.entries(redCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const allGreen = people.flatMap(p => p.green_flags || []);
  const greenCounts = {};
  allGreen.forEach(f => greenCounts[f] = (greenCounts[f]||0)+1);
  const topGreen = Object.entries(greenCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  let html = `
    <div class="page-subtitle" style="padding-top:12px">Patterns & data from everyone you've logged ✨</div>`;

  html += `<div class="section-title">📊 How We Met</div><div class="card">`;
  Object.entries(metCounts).filter(([,v])=>v>0).forEach(([k,v]) => {
    html += `<div class="bc-row">
      <div class="bc-label">${k}</div>
      <div class="bc-track"><div class="bc-fill" style="width:${(v/metMax)*100}%"></div></div>
      <div class="bc-count">${v}</div>
    </div>`;
  });
  if (!Object.values(metCounts).some(v=>v>0)) html += `<div style="color:var(--text3);font-size:13px;font-weight:600;text-align:center;padding:12px">No data yet 🌸</div>`;
  html += `</div>`;

  if (topRed.length > 0) {
    html += `<div class="section-title">🚩 Red Flag Patterns</div><div class="card">`;
    const rm = topRed[0][1];
    topRed.forEach(([f,v]) => {
      html += `<div class="bc-row">
        <div class="bc-label" style="color:var(--red)">${f}</div>
        <div class="bc-track"><div class="bc-fill" style="width:${(v/rm)*100}%;background:linear-gradient(90deg,#f9c0c8,var(--red))"></div></div>
        <div class="bc-count" style="color:var(--red)">${v}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (topGreen.length > 0) {
    html += `<div class="section-title">💚 Green Flag Patterns</div><div class="card">`;
    const gm = topGreen[0][1];
    topGreen.forEach(([f,v]) => {
      html += `<div class="bc-row">
        <div class="bc-label" style="color:#2d8a5a">${f}</div>
        <div class="bc-track"><div class="bc-fill" style="width:${(v/gm)*100}%;background:linear-gradient(90deg,#a8e6c0,#2d8a5a)"></div></div>
        <div class="bc-count" style="color:#2d8a5a">${v}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Compatibility meter: average score across all logged people
  if (people.length > 0) {
    const scoredAll = people.filter(p => p.traits && p.traits.some(t => t > 0));
    const overallAvg = scoredAll.length > 0
      ? scoredAll.reduce((sum, p) => sum + avgScore(p), 0) / scoredAll.length
      : 0;
    const pct = Math.round((overallAvg / 5) * 100);
    const statusBreakdown = STATUSES.map(s => ({
      label: s.label,
      count: people.filter(p => p.status === s.val).length
    })).filter(s => s.count > 0);

    html += `<div class="section-title">📊 Where Things Stand</div><div class="card">`;
    statusBreakdown.forEach(s => {
      html += `<div class="bc-row">
        <div class="bc-label">${s.label}</div>
        <div class="bc-track"><div class="bc-fill" style="width:${(s.count/people.length)*100}%"></div></div>
        <div class="bc-count">${s.count}</div>
      </div>`;
    });
    html += `</div>`;

    if (overallAvg > 0) {
      html += `<div class="section-title">💘 Compatibility Meter</div>`;
      html += `<div class="card" style="text-align:center;padding:20px 16px">
        <div style="font-size:38px;font-weight:900;color:var(--rose)">${overallAvg.toFixed(1)}<span style="font-size:18px;color:var(--text3)">/5</span></div>
        <div style="font-size:12px;color:var(--text3);font-weight:700;margin:4px 0 12px">Average across ${scoredAll.length} rated ${scoredAll.length===1?'person':'people'}</div>
        <div style="height:12px;background:var(--blush);border-radius:8px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--rose-light),var(--rose));border-radius:8px;transition:width 1s ease"></div>
        </div>
      </div>`;
    }
  }

  c.innerHTML = html;
}

function setNonneg(key, val) {
  nonnegAnswers[key] = val;
}

// ─── ADD / EDIT MODAL ───

function openAddModal() {
  editingId = null;
  resetForm();
  addStep = 1;
  document.getElementById('addModal').classList.add('open');
  renderStep();
}

function openEditModal(id) {
  closeProfileModal();
  const p = people.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  form = {
    name: p.name || '',
    how_met: p.how_met || '',
    first_impression: p.first_impression || '',
    intention: p.intention || '',
    status: p.status || '',
    traits: p.traits ? [...p.traits] : Array(TRAITS.length).fill(0),
    yn: p.yn ? { ...p.yn } : {},
    nonneg: p.nonneg ? { ...p.nonneg } : {},
    green_flags: p.green_flags ? [...p.green_flags] : [],
    red_flags: p.red_flags ? [...p.red_flags] : [],
    custom_green: '',
    custom_red: '',
    one_liner: p.one_liner || '',
    notes: p.notes || ''
  };
  addStep = 1;
  document.getElementById('addModal').classList.add('open');
  renderStep();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  renderCurrentTab();
}

function renderStepIndicator() {
  const html = Array.from({length: TOTAL_STEPS}, (_, i) => {
    const cls = i + 1 === addStep ? 'active' : i + 1 < addStep ? 'done' : '';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('');
  document.getElementById('stepIndicator').innerHTML = html;
}

function renderStep() {
  renderStepIndicator();
  document.getElementById('modalTitle').textContent = STEP_TITLES[addStep - 1];

  const body = document.getElementById('modalBody');

  // STEP 1: Basics
  if (addStep === 1) {
    body.innerHTML = `
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="f-name" placeholder="What do you call him?" value="${escHtml(form.name)}"/>
      </div>
      <div class="form-group">
        <label class="form-label">How did you meet?</label>
        <div class="option-grid cols3" id="howMetGrid">
          ${HOW_MET.map(h => `<button type="button" class="option-btn${form.how_met===h?' selected':''}" data-howmet="${escAttr(h)}">${h}</button>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">First impression ✨</label>
        <textarea class="form-input form-textarea" id="f-fi" placeholder="What was the vibe when you first met?">${escHtml(form.first_impression)}</textarea>
      </div>
      <div class="step-nav">
        <button type="button" class="btn-next" id="nextBtn1">Next →</button>
      </div>`;

    document.querySelectorAll('#howMetGrid .option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        form.how_met = btn.dataset.howmet;
        document.querySelectorAll('#howMetGrid .option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });

    document.getElementById('nextBtn1').addEventListener('click', () => {
      syncStep1(); nextStep();
    });
  }

  // STEP 2: Intention
  else if (addStep === 2) {
    body.innerHTML = `
      <div class="form-group">
        <div class="option-grid cols2" id="intentionGrid">
          ${INTENTIONS.map(i => `<button type="button" class="option-btn${form.intention===i.val?' selected':''}" data-val="${i.val}">${i.label}</button>`).join('')}
        </div>
        <div class="intention-warning" id="intentWarn" style="${['casual','says-serious'].includes(form.intention)?'display:block':'display:none'}">
          💛 Just a gentle reminder — you're looking for something serious ❤️ Still worth logging, just go in clear-eyed!
        </div>
      </div>
      <div class="step-nav">
        <button type="button" class="btn-back" id="backBtn2">← Back</button>
        <button type="button" class="btn-next" id="nextBtn2">Next →</button>
      </div>`;

    document.querySelectorAll('#intentionGrid .option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        form.intention = btn.dataset.val;
        document.querySelectorAll('#intentionGrid .option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const w = document.getElementById('intentWarn');
        if (w) w.style.display = ['casual','says-serious'].includes(form.intention) ? 'block' : 'none';
      });
    });
    document.getElementById('backBtn2').addEventListener('click', prevStep);
    document.getElementById('nextBtn2').addEventListener('click', nextStep);
  }

  // STEP 3: My Non-Negotiables
  else if (addStep === 3) {
    body.innerHTML = `
      <div class="nonneg-section-title" style="font-size:14px;font-weight:900;color:var(--rose-dark);margin-bottom:8px">Must‑Haves ✅ <span style="font-weight:600;font-size:12px;color:var(--text3)">(aka bare minimum)</span></div>
      <div class="yn-list" id="nnList">
        ${NONNEG_ITEMS.map(item => `
          <div class="yn-row">
            <div class="yn-label">${item.label}</div>
            <div class="nonneg-btns">
              <button type="button" class="yn-btn yes${form.nonneg&&form.nonneg[item.key]==='yes'?' active':''}" data-key="${item.key}" data-yn="yes">Yayy 🌸</button>
              <button type="button" class="yn-btn no${form.nonneg&&form.nonneg[item.key]==='no'?' active':''}" data-key="${item.key}" data-yn="no">Nay 🌵</button>
              <button type="button" class="yn-btn maybe${form.nonneg&&form.nonneg[item.key]==='maybe'?' active':''}" data-key="${item.key}" data-yn="maybe">Still Figuring 👀</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="nonneg-section-title" style="font-size:14px;font-weight:900;color:var(--rose-dark);margin:16px 0 8px">Nice‑to‑Haves ✨ <span style="font-weight:600;font-size:12px;color:var(--text3)">(aka brownie points)</span></div>
      <div class="yn-list" id="nthList">
        ${NICETOHAVE_ITEMS.map(item => `
          <div class="yn-row">
            <div class="yn-label">${item.label}</div>
            <div class="nonneg-btns">
              <button type="button" class="yn-btn yes${form.nonneg&&form.nonneg[item.key]==='yes'?' active':''}" data-key="${item.key}" data-yn="yes">Yayy 🌸</button>
              <button type="button" class="yn-btn no${form.nonneg&&form.nonneg[item.key]==='no'?' active':''}" data-key="${item.key}" data-yn="no">Nay 🌵</button>
              <button type="button" class="yn-btn maybe${form.nonneg&&form.nonneg[item.key]==='maybe'?' active':''}" data-key="${item.key}" data-yn="maybe">Still Figuring 👀</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="step-nav">
        <button type="button" class="btn-back" id="backBtn3">← Back</button>
        <button type="button" class="btn-next" id="nextBtn3">Next →</button>
      </div>`;

    document.querySelectorAll('#nnList .yn-btn, #nthList .yn-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const val = btn.dataset.yn;
        if (!form.nonneg) form.nonneg = {};
        form.nonneg[key] = val;
        document.querySelectorAll(`[data-key="${key}"]`).forEach(b => {
          b.classList.remove('active');
          if (b.dataset.yn === val) b.classList.add('active');
        });
      });
    });
    document.getElementById('backBtn3').addEventListener('click', prevStep);
    document.getElementById('nextBtn3').addEventListener('click', nextStep);
  }

  // STEP 4: Straightforward Qs (Yes/No)
  else if (addStep === 4) {
    body.innerHTML = `
      <div style="font-size:13px;color:var(--text3);font-weight:600;margin-bottom:12px">Quick yes/no - you'll thank yourself later 📋</div>
      <div class="yn-list" id="ynList">
        ${YN_QUESTIONS.map(q => `
          <div class="yn-row">
            <div class="yn-label">${q.label}</div>
            <div class="yn-btns">
              <button type="button" class="yn-btn yes${form.yn[q.key]===true?' active':''}" data-key="${q.key}" data-yn="yes">✓</button>
              <button type="button" class="yn-btn no${form.yn[q.key]===false?' active':''}" data-key="${q.key}" data-yn="no">✗</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="step-nav">
        <button type="button" class="btn-back" id="backBtn4">← Back</button>
        <button type="button" class="btn-next" id="nextBtn4">Next →</button>
      </div>`;

    document.querySelectorAll('#ynList .yn-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const val = btn.dataset.yn === 'yes';
        form.yn[key] = val;
        document.querySelectorAll(`[data-key="${key}"]`).forEach(b => {
          b.classList.remove('active');
          if ((b.dataset.yn === 'yes' && val) || (b.dataset.yn === 'no' && !val)) b.classList.add('active');
        });
      });
    });
    document.getElementById('backBtn4').addEventListener('click', prevStep);
    document.getElementById('nextBtn4').addEventListener('click', nextStep);
  }

  // STEP 5: Soul-O-Meter (Traits rating)
  else if (addStep === 5) {
    body.innerHTML = `
      <div style="font-size:13px;color:var(--text3);font-weight:600;margin-bottom:12px">Honest thoughts - straight from your 💗</div>
      <div class="trait-list" id="traitList">
        ${TRAITS.map((t, i) => `
          <div class="trait-row">
            <div class="trait-name">${t}</div>
            <div class="star-row" id="stars-${i}">
              ${[1,2,3,4,5].map(s => `<span class="star${form.traits[i]>=s?' filled':''}" data-trait="${i}" data-val="${s}">★</span>`).join('')}
            </div>
          </div>`).join('')}
      </div>
      <div class="step-nav">
        <button type="button" class="btn-back" id="backBtn5">← Back</button>
        <button type="button" class="btn-next" id="nextBtn5">Next →</button>
      </div>`;

    document.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', () => {
        const i = parseInt(star.dataset.trait);
        const v = parseInt(star.dataset.val);
        form.traits[i] = v;
        document.querySelectorAll(`#stars-${i} .star`).forEach((s, idx) => {
          s.classList.toggle('filled', idx < v);
        });
      });
    });
    document.getElementById('backBtn5').addEventListener('click', prevStep);
    document.getElementById('nextBtn5').addEventListener('click', nextStep);
  }

  // STEP 6: Flags
  else if (addStep === 6) {
    body.innerHTML = `
      <div class="form-group">
        <label class="form-label">💚 Green Flags</label>
        <div class="flag-tags" id="greenFlagTags">
          ${GREEN_FLAGS_PRESET.map(f => `<div class="flag-tag green${form.green_flags.includes(f)?' selected':''}" data-flag="${escAttr(f)}" data-type="green">${f}</div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input class="form-input" id="cg" placeholder="Add your own..." style="flex:1" value="${escHtml(form.custom_green)}"/>
          <button type="button" class="btn-next" style="flex:0;padding:10px 14px;border-radius:12px" id="addGreenBtn">+</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">🚩 Red Flags</label>
        <div class="flag-tags" id="redFlagTags">
          ${RED_FLAGS_PRESET.map(f => `<div class="flag-tag red${form.red_flags.includes(f)?' selected':''}" data-flag="${escAttr(f)}" data-type="red">${f}</div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input class="form-input" id="cr" placeholder="Add your own..." style="flex:1" value="${escHtml(form.custom_red)}"/>
          <button type="button" class="btn-next" style="flex:0;padding:10px 14px;border-radius:12px;background:var(--red)" id="addRedBtn">+</button>
        </div>
      </div>
      <div class="step-nav">
        <button type="button" class="btn-back" id="backBtn6">← Back</button>
        <button type="button" class="btn-next" id="nextBtn6">Next →</button>
      </div>`;

    document.querySelectorAll('#greenFlagTags .flag-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const f = tag.dataset.flag;
        const idx = form.green_flags.indexOf(f);
        if (idx === -1) { form.green_flags.push(f); tag.classList.add('selected'); }
        else { form.green_flags.splice(idx, 1); tag.classList.remove('selected'); }
      });
    });
    document.querySelectorAll('#redFlagTags .flag-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const f = tag.dataset.flag;
        const idx = form.red_flags.indexOf(f);
        if (idx === -1) { form.red_flags.push(f); tag.classList.add('selected'); }
        else { form.red_flags.splice(idx, 1); tag.classList.remove('selected'); }
      });
    });
    document.getElementById('cg').addEventListener('input', e => form.custom_green = e.target.value);
    document.getElementById('cr').addEventListener('input', e => form.custom_red = e.target.value);
    document.getElementById('addGreenBtn').addEventListener('click', () => addCustomFlag('green'));
    document.getElementById('addRedBtn').addEventListener('click', () => addCustomFlag('red'));
    document.getElementById('backBtn6').addEventListener('click', prevStep);
    document.getElementById('nextBtn6').addEventListener('click', nextStep);
  }

  // STEP 7: Where Things Stand (Status)
  else if (addStep === 7) {
    body.innerHTML = `
      <div class="form-group">
        <label class="form-label">Where do things stand right now? 🌸</label>
        <div class="option-grid cols2" id="statusGrid">
          ${STATUSES.map(s => `<button type="button" class="option-btn${form.status===s.val?' selected':''}" data-val="${s.val}">${s.label}</button>`).join('')}
        </div>
      </div>
      <div class="step-nav">
        <button type="button" class="btn-back" id="backBtn7">← Back</button>
        <button type="button" class="btn-next" id="nextBtn7">Next →</button>
      </div>`;

    document.querySelectorAll('#statusGrid .option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        form.status = btn.dataset.val;
        document.querySelectorAll('#statusGrid .option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
    document.getElementById('backBtn7').addEventListener('click', prevStep);
    document.getElementById('nextBtn7').addEventListener('click', nextStep);
  }

  // STEP 8: Final Thoughts
  else if (addStep === 8) {
    body.innerHTML = `
      <div class="form-group">
        <label class="form-label">How does he make you feel in one line? 💭</label>
        <input class="form-input" id="f-ol" placeholder="The vibe in one sentence..." value="${escHtml(form.one_liner)}"/>
      </div>
      <div class="form-group">
        <label class="form-label">Anything else you want to remember? 📝</label>
        <textarea class="form-input form-textarea" id="f-notes" placeholder="Context, feelings, anything you want to keep...">${escHtml(form.notes)}</textarea>
      </div>
      <div class="step-nav">
        <button type="button" class="btn-back" id="backBtn8">← Back</button>
        <button type="button" class="btn-next" id="saveBtn" style="background:linear-gradient(135deg,#6dbf8a,#2d8a5a)">Save 💾</button>
      </div>`;

    document.getElementById('backBtn8').addEventListener('click', prevStep);
  }
}

function syncStep1() {
  const nameEl = document.getElementById('f-name');
  if (nameEl) form.name = nameEl.value;
  const fiEl = document.getElementById('f-fi');
  // FIX #10: ensure first impression is always read from textarea
  if (fiEl) form.first_impression = fiEl.value;
}

function addCustomFlag(type) {
  const val = type === 'green' ? form.custom_green.trim() : form.custom_red.trim();
  if (!val) return;
  const arr = type === 'green' ? form.green_flags : form.red_flags;
  if (!arr.includes(val)) arr.push(val);
  if (type === 'green') form.custom_green = ''; else form.custom_red = '';
  renderStep();
}

function nextStep() {
  // Always sync text fields before advancing
  const nameEl = document.getElementById('f-name');
  if (nameEl) form.name = nameEl.value;
  const fiEl = document.getElementById('f-fi');
  if (fiEl) form.first_impression = fiEl.value;

  if (addStep === 1 && !form.name.trim()) { showToast('Add a name first 💕'); return; }
  if (addStep < TOTAL_STEPS) { addStep++; renderStep(); }
}

function prevStep() {
  if (addStep > 1) { addStep--; renderStep(); }
}

async function submitForm() {
  const olEl = document.getElementById('f-ol');
  if (olEl) form.one_liner = olEl.value;
  const notesEl = document.getElementById('f-notes');
  if (notesEl) form.notes = notesEl.value;

  if (!form.name.trim()) { showToast('Name is required 💕'); return; }

  // FIX #21: payload id for new records uses timestamp; editingId is the DB row id
  const payloadId = editingId || Date.now().toString();
  const payload = {
    id: payloadId,
    name: form.name.trim(),
    how_met: form.how_met,
    first_impression: form.first_impression,
    intention: form.intention,
    status: form.status,
    traits: form.traits,
    yn: form.yn,
    nonneg: form.nonneg || {},
    green_flags: form.green_flags,
    red_flags: form.red_flags,
    one_liner: form.one_liner,
    notes: form.notes
  };

  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }

  const ok = await savePerson(payload);
  if (ok) {
    closeAddModal();
    showToast(editingId ? 'Updated! ✨' : 'Logged! 🌸 The search continues...');
  } else {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save 💾'; }
  }
}

// ─── HELPERS ───
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return (s || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── BOOT ───
init();
